version: '3.8'

services:
  postgres_local:
    image: postgres:16-alpine
    container_name: compraventa_db
    restart: always
    environment:
      POSTGRES_DB: compraventa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: CompraVentaLocal_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_v6.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: compraventa_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@compraventa.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres_local

volumes:
  postgres_data:
